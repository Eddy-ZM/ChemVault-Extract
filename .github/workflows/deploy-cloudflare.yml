name: Deploy frontend to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-cloudflare.yml"
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: cloudflare-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      API_BASE_URL: https://api.chemvault.science
      CLOUDFLARE_ACCOUNT_ID: 20f69e8d2aebbadbff2b6ffa36efee50
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate Cloudflare API token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare Workers
        run: npm run cf:build -w apps/web

      - name: Deploy to Cloudflare Workers
        run: npm run cf:deploy -w apps/web
