name: Deploy Extract sunset redirect

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-cloudflare.yml"
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy redirect surface
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEXT_PUBLIC_APP_URL: https://app.chemvault.science
      NEXT_PUBLIC_CHEMVAULT_USER_URL: https://user.chemvault.science
      NEXT_PUBLIC_CHEMVAULT_LAB_URL: https://lab.chemvault.science
      NEXT_PUBLIC_PRODUCT_MODE: sunset
      CHEMVAULT_USER_BASE_URL: https://user.chemvault.science
      CHEMVAULT_USER_COOKIE_NAME: chemvault_session
      CHEMVAULT_USER_COOKIE_DOMAIN: .chemvault.science
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build frontend for Cloudflare
        run: npm run cf:build -w apps/web

      - name: Deploy frontend Worker
        run: npm run deploy:cloudflare -w apps/web

      - name: Verify successor redirect configuration
        run: |
          test "$NEXT_PUBLIC_PRODUCT_MODE" = "sunset"
          test "$NEXT_PUBLIC_CHEMVAULT_LAB_URL" = "https://lab.chemvault.science"
