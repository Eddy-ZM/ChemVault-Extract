name: Deploy Cloudflare edge

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-cloudflare.yml"
      - "apps/web/**"
      - "workers/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy Cloudflare Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      API_BASE_URL: https://api.chemvault.science
      BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
      NEXT_PUBLIC_API_BASE_URL: https://api.chemvault.science
      NEXT_PUBLIC_APP_URL: https://app.chemvault.science
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      NEXT_PUBLIC_CHEMVAULT_USER_URL: https://user.chemvault.science
      CHEMVAULT_USER_BASE_URL: https://user.chemvault.science
      CHEMVAULT_USER_COOKIE_NAME: chemvault_session
      CHEMVAULT_USER_COOKIE_DOMAIN: .chemvault.science
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build frontend for Cloudflare
        run: npm run cf:build -w apps/web

      - name: Deploy frontend Worker
        run: npm run deploy:cloudflare -w apps/web

      - name: Configure API gateway backend
        if: env.BACKEND_API_URL != ''
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = "workers/api-gateway/wrangler.jsonc";
          const config = JSON.parse(fs.readFileSync(path, "utf8"));
          config.vars = config.vars || {};
          config.vars.BACKEND_API_URL = process.env.BACKEND_API_URL;
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Deploy API gateway Worker
        if: env.BACKEND_API_URL != ''
        run: npm run deploy -w @chemvault/api-gateway-worker

      - name: Ensure webhook delivery queue exists
        if: env.BACKEND_API_URL != ''
        run: npx wrangler queues create chemvault-webhook-delivery || true

      - name: Deploy webhook delivery Worker
        if: env.BACKEND_API_URL != ''
        run: npm run deploy -w @chemvault/webhook-delivery-worker

      - name: Skip backend edge workers
        if: env.BACKEND_API_URL == ''
        run: |
          echo "Skipping API gateway and webhook delivery workers because BACKEND_API_URL is not configured."

      - name: Backend deployment placeholder
        run: |
          echo "FastAPI, PostgreSQL, Redis, and heavy Python workers are deployed separately."
