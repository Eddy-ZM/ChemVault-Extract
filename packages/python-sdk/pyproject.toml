[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "chemvault"
version = "0.1.0"
description = "Python SDK for the ChemVault Extract developer API."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["httpx>=0.28.0"]

[tool.setuptools.packages.find]
include = ["chemvault*"]
