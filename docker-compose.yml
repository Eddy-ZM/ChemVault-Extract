services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chemvault
      POSTGRES_PASSWORD: chemvault
      POSTGRES_DB: chemvault_extract
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chemvault -d chemvault_extract"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-chemvault}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-chemvault-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./services/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://chemvault:chemvault@postgres:5432/chemvault_extract}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_QUEUE: ${REDIS_QUEUE:-chemvault:extract:jobs}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-chemvault}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-chemvault-secret}
      S3_BUCKET: ${S3_BUCKET:-chemvault-documents}
      AI_EXTRACTION_PROVIDER: ${AI_EXTRACTION_PROVIDER:-none}
      AI_MODEL: ${AI_MODEL:-offline-no-provider}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: ./services
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://chemvault:chemvault@postgres:5432/chemvault_extract}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_QUEUE: ${REDIS_QUEUE:-chemvault:extract:jobs}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-chemvault}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-chemvault-secret}
      S3_BUCKET: ${S3_BUCKET:-chemvault-documents}
      WORKER_STEP_DELAY_SECONDS: ${WORKER_STEP_DELAY_SECONDS:-0.75}
      AI_EXTRACTION_PROVIDER: ${AI_EXTRACTION_PROVIDER:-none}
      AI_MODEL: ${AI_MODEL:-offline-no-provider}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
