services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chemvault
      POSTGRES_PASSWORD: chemvault
      POSTGRES_DB: chemvault_extract
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chemvault -d chemvault_extract"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-chemvault}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-chemvault-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./services/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://chemvault:chemvault@postgres:5432/chemvault_extract}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      QUEUE_PROVIDER: ${QUEUE_PROVIDER:-redis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_QUEUE: ${REDIS_QUEUE:-chemvault:extract:jobs}
      WEBHOOK_DELIVERY_QUEUE: ${WEBHOOK_DELIVERY_QUEUE:-chemvault:webhook:deliveries}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-chemvault}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-chemvault-secret}
      S3_BUCKET: ${S3_BUCKET:-chemvault-documents}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-chemvault}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-chemvault-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-chemvault-documents}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRES_IN_MINUTES: ${JWT_EXPIRES_IN_MINUTES:-10080}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      ALLOW_USER_OPENAI_KEYS: ${ALLOW_USER_OPENAI_KEYS:-true}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-gpt-5.5}
      AI_MAX_CHUNKS_PER_DOCUMENT: ${AI_MAX_CHUNKS_PER_DOCUMENT:-20}
      AI_MAX_CHUNK_CHARS: ${AI_MAX_CHUNK_CHARS:-6000}
      AI_ENABLE_FALLBACK_MODEL: ${AI_ENABLE_FALLBACK_MODEL:-false}
      AI_ESTIMATED_INPUT_TOKEN_RATIO: ${AI_ESTIMATED_INPUT_TOKEN_RATIO:-0.25}
      AI_MONTHLY_FREE_FILE_LIMIT: ${AI_MONTHLY_FREE_FILE_LIMIT:-10}
      DEFAULT_FREE_MONTHLY_AI_FILE_LIMIT: ${DEFAULT_FREE_MONTHLY_AI_FILE_LIMIT:-10}
      DEFAULT_FREE_MONTHLY_AI_COST_LIMIT_USD: ${DEFAULT_FREE_MONTHLY_AI_COST_LIMIT_USD:-5.00}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CUSTOMER_PORTAL_RETURN_URL: ${STRIPE_CUSTOMER_PORTAL_RETURN_URL:-http://localhost:3000/account/billing}
      STRIPE_CHECKOUT_SUCCESS_URL: ${STRIPE_CHECKOUT_SUCCESS_URL:-http://localhost:3000/account/billing/success}
      STRIPE_CHECKOUT_CANCEL_URL: ${STRIPE_CHECKOUT_CANCEL_URL:-http://localhost:3000/account/billing/cancel}
      STRIPE_PRICE_STUDENT_MONTHLY: ${STRIPE_PRICE_STUDENT_MONTHLY:-}
      STRIPE_PRICE_RESEARCHER_MONTHLY: ${STRIPE_PRICE_RESEARCHER_MONTHLY:-}
      STRIPE_PRICE_LAB_MONTHLY: ${STRIPE_PRICE_LAB_MONTHLY:-}
      STRIPE_PRICE_STUDENT_YEARLY: ${STRIPE_PRICE_STUDENT_YEARLY:-}
      STRIPE_PRICE_RESEARCHER_YEARLY: ${STRIPE_PRICE_RESEARCHER_YEARLY:-}
      STRIPE_PRICE_LAB_YEARLY: ${STRIPE_PRICE_LAB_YEARLY:-}
      PUBCHEM_BASE_URL: ${PUBCHEM_BASE_URL:-https://pubchem.ncbi.nlm.nih.gov}
      PUBCHEM_TIMEOUT_SECONDS: ${PUBCHEM_TIMEOUT_SECONDS:-5.0}
      PUBCHEM_CACHE_TTL_SECONDS: ${PUBCHEM_CACHE_TTL_SECONDS:-3600}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: ./services
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://chemvault:chemvault@postgres:5432/chemvault_extract}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      NODE_ENV: ${NODE_ENV:-development}
      QUEUE_PROVIDER: ${QUEUE_PROVIDER:-redis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_QUEUE: ${REDIS_QUEUE:-chemvault:extract:jobs}
      WEBHOOK_DELIVERY_QUEUE: ${WEBHOOK_DELIVERY_QUEUE:-chemvault:webhook:deliveries}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-chemvault}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-chemvault-secret}
      S3_BUCKET: ${S3_BUCKET:-chemvault-documents}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-chemvault}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-chemvault-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-chemvault-documents}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN:-}
      WORKER_STEP_DELAY_SECONDS: ${WORKER_STEP_DELAY_SECONDS:-0.75}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRES_IN_MINUTES: ${JWT_EXPIRES_IN_MINUTES:-10080}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      ALLOW_USER_OPENAI_KEYS: ${ALLOW_USER_OPENAI_KEYS:-true}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-gpt-5.5}
      AI_MAX_CHUNKS_PER_DOCUMENT: ${AI_MAX_CHUNKS_PER_DOCUMENT:-20}
      AI_MAX_CHUNK_CHARS: ${AI_MAX_CHUNK_CHARS:-6000}
      AI_ENABLE_FALLBACK_MODEL: ${AI_ENABLE_FALLBACK_MODEL:-false}
      AI_ESTIMATED_INPUT_TOKEN_RATIO: ${AI_ESTIMATED_INPUT_TOKEN_RATIO:-0.25}
      AI_MONTHLY_FREE_FILE_LIMIT: ${AI_MONTHLY_FREE_FILE_LIMIT:-10}
      DEFAULT_FREE_MONTHLY_AI_FILE_LIMIT: ${DEFAULT_FREE_MONTHLY_AI_FILE_LIMIT:-10}
      DEFAULT_FREE_MONTHLY_AI_COST_LIMIT_USD: ${DEFAULT_FREE_MONTHLY_AI_COST_LIMIT_USD:-5.00}
      PUBCHEM_BASE_URL: ${PUBCHEM_BASE_URL:-https://pubchem.ncbi.nlm.nih.gov}
      PUBCHEM_TIMEOUT_SECONDS: ${PUBCHEM_TIMEOUT_SECONDS:-5.0}
      PUBCHEM_CACHE_TTL_SECONDS: ${PUBCHEM_CACHE_TTL_SECONDS:-3600}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
